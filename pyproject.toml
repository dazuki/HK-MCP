[tool.uv]
# Herrljunga Kommuns MCP-servrar - virtuell arbetsyta (inget rotpaket)
default-groups = ["dev"]

[tool.uv.workspace]
members = ["libs/*", "servers/*"]
exclude = ["templates/*"]

[dependency-groups]
dev = [
    "ruff>=0.11",
    "pytest>=8.0",
]

[tool.pyright]
venvPath = "."
venv = ".venv"
extraPaths = [
    "libs/core/src",
    "servers/skolverket/src",
    "servers/kolada/src",
    "servers/time/src",
]
