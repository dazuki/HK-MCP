# Lokal körning av HK MCP-servrar som docker-containers.
#
# Konfiguration sker via HK_*-env vars (inga mcp-config.toml mountas).
# Listor måste vara JSON-strängar: HK_AUTH_TOKENS='["tok1","tok2"]'.
#
# Bygg alla images:
#   docker compose build
# Starta allt:
#   docker compose up -d
# En server i taget:
#   docker compose up -d --build skolverket
#
# Images taggas som hk-mcp/<server>:latest och finns sedan lokalt för
# användning utanför compose (t.ex. av reverse proxy på värden).

x-common-env: &common-env
  HK_LOG_LEVEL: INFO
  HK_ENVIRONMENT: production
  HK_ALLOWED_ORIGINS: '["*"]'
  # IP för reverse proxy som skickar X-Forwarded-*-headers. Justera efter
  # proxyns nät (t.ex. docker bridge eller fysisk hosts IP).
  HK_FORWARDED_ALLOW_IPS: '172.16.0.0/12'
  HK_ACCESS_LOG: 'false'

x-common-healthcheck: &common-healthcheck
  test:
    [
      'CMD',
      'python',
      '-c',
      "import urllib.request,sys; sys.exit(0 if
      urllib.request.urlopen('http://127.0.0.1:8000/docs.json',timeout=3).status==200
      else 1)",
    ]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 5s

services:
  skolverket:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVER: skolverket
    image: hk-mcp/skolverket:latest
    container_name: hk-mcp-skolverket
    restart: unless-stopped
    ports:
      - '3070:8000'
    environment:
      <<: *common-env
      # Lägg till din reverse proxy-domän här vid publik exponering,
      # t.ex. "skolverket.mcp.example.org". DNS rebinding-skydd.
      HK_ALLOWED_HOSTS: '["localhost","127.0.0.1"]'
      HK_AUTH_TOKENS: ${SKOLVERKET_AUTH_TOKENS:-[]}
    healthcheck: *common-healthcheck

  kolada:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVER: kolada
    image: hk-mcp/kolada:latest
    container_name: hk-mcp-kolada
    restart: unless-stopped
    ports:
      - '3071:8000'
    environment:
      <<: *common-env
      HK_ALLOWED_HOSTS: '["localhost","127.0.0.1"]'
      HK_AUTH_TOKENS: ${KOLADA_AUTH_TOKENS:-[]}
    healthcheck: *common-healthcheck

  time:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVER: time
    image: hk-mcp/time:latest
    container_name: hk-mcp-time
    restart: unless-stopped
    ports:
      - '3072:8000'
    environment:
      <<: *common-env
      HK_ALLOWED_HOSTS: '["localhost","127.0.0.1"]'
      HK_AUTH_TOKENS: ${TIME_AUTH_TOKENS:-[]}
    healthcheck: *common-healthcheck

  scb:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVER: scb
    image: hk-mcp/scb:latest
    container_name: hk-mcp-scb
    restart: unless-stopped
    ports:
      - '3073:8000'
    environment:
      <<: *common-env
      HK_ALLOWED_HOSTS: '["localhost","127.0.0.1"]'
      HK_AUTH_TOKENS: ${SCB_AUTH_TOKENS:-[]}
    healthcheck: *common-healthcheck
