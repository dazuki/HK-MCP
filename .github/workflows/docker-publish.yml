name: Build & publish Docker images

# Bygger en image per server i matrix och pushar till GitHub Container
# Registry (ghcr.io). Taggar:
#   - latest        - senaste commit på main
#   - <branch>      - senaste commit på branchen
#   - <sha>         - kortat commit-sha (alltid unikt)
#   - v1.2.3        - från git-tag (semver)
#   - 1.2, 1        - major/minor-aliaser för semver-taggar

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        server: [skolverket, kolada, time, scb]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase ägar-/repo-namn för GHCR
        id: repo
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login till GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (taggar & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.owner }}/hk-mcp-${{ matrix.server }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            SERVER=${{ matrix.server }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.server }}
          cache-to: type=gha,mode=max,scope=${{ matrix.server }}
          provenance: true
          sbom: true
